<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Log Fill-up</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; padding: 20px 16px 40px; }

  h1 { font-size: 1.2rem; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 0.78rem; color: #666; margin-bottom: 24px; }

  /* Setup screen */
  #setup { display: none; }
  .setup-field { margin-bottom: 16px; }
  .setup-field label { display: block; font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .setup-field input { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px 14px; color: #fff; font-size: 0.9rem; font-family: monospace; }
  .setup-field input:focus { outline: none; border-color: #4da6ff; }
  .hint { font-size: 0.72rem; color: #555; margin-top: 5px; }

  /* Photo capture */
  .photo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .photo-btn { position: relative; background: #1a1a1a; border: 2px dashed #333; border-radius: 12px; aspect-ratio: 4/3; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; overflow: hidden; }
  .photo-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .photo-btn .icon { font-size: 2rem; }
  .photo-btn .label { font-size: 0.72rem; color: #888; text-align: center; padding: 0 8px; }
  .photo-btn img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .photo-btn.has-photo { border-style: solid; border-color: #2a6496; }
  .photo-btn .check { position: absolute; top: 6px; right: 6px; background: #2a6496; border-radius: 50%; width: 20px; height: 20px; align-items: center; justify-content: center; font-size: 0.7rem; display: none; }
  .photo-btn.has-photo .check { display: flex; }

  /* Buttons */
  .btn { width: 100%; padding: 16px; border-radius: 10px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #2a6496; color: #fff; }
  .btn-primary:active:not(:disabled) { opacity: 0.8; }
  .btn-success { background: #2e7d32; color: #fff; }
  .btn-success:active:not(:disabled) { opacity: 0.8; }
  .btn-sm { font-size: 0.82rem; padding: 10px; width: auto; }
  .btn-ghost { background: transparent; border: 1px solid #333; color: #888; }

  /* Status */
  #status { text-align: center; padding: 14px; font-size: 0.85rem; color: #888; min-height: 48px; }
  #status.error { color: #e57373; }
  #status.success { color: #81c784; }

  /* Form */
  #form-section { display: none; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
  .field input, .field select { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px 14px; color: #fff; font-size: 1rem; }
  .field input:focus, .field select:focus { outline: none; border-color: #4da6ff; }
  .field select option { background: #1a1a1a; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .check-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; }
  .check-row input[type=checkbox] { width: 20px; height: 20px; accent-color: #4da6ff; }
  .check-row label { font-size: 0.9rem; color: #ccc; }
  .computed { font-size: 0.72rem; color: #555; margin-top: 4px; }

  /* Success */
  #done-section { display: none; text-align: center; padding: 40px 20px; }
  #done-section .big { font-size: 3rem; margin-bottom: 12px; }
  #done-section h2 { color: #81c784; margin-bottom: 8px; }
  #done-section p { color: #666; font-size: 0.85rem; margin-bottom: 24px; }

  .divider { border: none; border-top: 1px solid #222; margin: 20px 0; }
  .settings-link { text-align: center; margin-top: 16px; }
  .settings-link button { background: none; border: none; color: #444; font-size: 0.75rem; cursor: pointer; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #444; border-top-color: #4da6ff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup">
  <h1>Setup</h1>
  <p class="subtitle">One-time setup. Keys stay on your phone only.</p>
  <div class="setup-field">
    <label>GitHub Personal Access Token</label>
    <input type="password" id="gh-pat" placeholder="ghp_..." autocomplete="off">
    <p class="hint">Needs <code>repo</code> (Contents: write) scope · github.com/settings/tokens</p>
  </div>
  <div class="setup-field">
    <label>Anthropic API Key</label>
    <input type="password" id="anth-key" placeholder="sk-ant-..." autocomplete="off">
    <p class="hint">console.anthropic.com/settings/keys</p>
  </div>
  <br>
  <button class="btn btn-primary" onclick="saveSetup()">Save &amp; Continue</button>
</div>

<!-- MAIN LOGGING SCREEN -->
<div id="main" style="display:none">
  <h1>Log Fill-up</h1>
  <p class="subtitle">Photo both, then parse.</p>

  <div class="photo-row">
    <label class="photo-btn" id="pump-btn">
      <input type="file" accept="image/*" capture="environment" id="pump-input" onchange="onPhoto('pump', this)">
      <span class="icon">⛽</span>
      <span class="label">Pump display</span>
      <span class="check">✓</span>
    </label>
    <label class="photo-btn" id="odo-btn">
      <input type="file" accept="image/*" capture="environment" id="odo-input" onchange="onPhoto('odo', this)">
      <span class="icon">🔢</span>
      <span class="label">Odometer</span>
      <span class="check">✓</span>
    </label>
  </div>

  <button class="btn btn-primary" id="parse-btn" disabled onclick="parse()">Parse photos</button>
  <div id="status"></div>

  <!-- FORM (shown after parse) -->
  <div id="form-section">
    <hr class="divider">
    <div class="field">
      <label>Date</label>
      <input type="date" id="f-date">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Odometer (mi)</label>
        <input type="number" id="f-odo" step="1" oninput="updateDist()">
        <div class="computed" id="dist-hint"></div>
      </div>
      <div class="field">
        <label>Fuel type</label>
        <select id="f-fuel">
          <option>Gasoline</option>
          <option>Gas Premium</option>
          <option>Diesel</option>
          <option>Electric</option>
        </select>
      </div>
    </div>
    <div class="field-row three">
      <div class="field">
        <label>Gallons</label>
        <input type="number" id="f-gal" step="0.001" oninput="updateTotal()">
      </div>
      <div class="field">
        <label>$/gal</label>
        <input type="number" id="f-price" step="0.001" oninput="updateTotal()">
      </div>
      <div class="field">
        <label>Total $</label>
        <input type="number" id="f-total" step="0.01">
      </div>
    </div>
    <div class="check-row">
      <input type="checkbox" id="f-full" checked>
      <label for="f-full">Full tank</label>
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <input type="text" id="f-notes" placeholder="">
    </div>
    <br>
    <button class="btn btn-success" id="commit-btn" onclick="commitEntry()">Log it</button>
  </div>

  <div class="settings-link">
    <button onclick="showSetup()">⚙ API keys</button>
  </div>
</div>

<!-- DONE SCREEN -->
<div id="done-section">
  <div class="big">✅</div>
  <h2>Logged</h2>
  <p id="done-summary"></p>
  <button class="btn btn-primary" onclick="reset()">Log another</button>
  <br><br>
  <a href="index.html" style="color:#555;font-size:0.82rem">← Dashboard</a>
</div>

<script>
const REPO = 'gourab5139014/carmanager';
const FILE = 'drivvo_ada_export.json';
const API  = 'https://api.anthropic.com/v1/messages';

let pumpB64 = null, odoB64 = null, pumpMime = 'image/jpeg', odoMime = 'image/jpeg';
let lastOdo = null; // most recent odometer from existing data

// ── Setup ─────────────────────────────────────────────────────────────────────
function hasKeys() {
  return localStorage.getItem('cm_gh_pat') && localStorage.getItem('cm_anth_key');
}
function showSetup() {
  document.getElementById('setup').style.display = 'block';
  document.getElementById('main').style.display = 'none';
  document.getElementById('done-section').style.display = 'none';
  document.getElementById('gh-pat').value = localStorage.getItem('cm_gh_pat') || '';
  document.getElementById('anth-key').value = localStorage.getItem('cm_anth_key') || '';
}
function saveSetup() {
  const pat = document.getElementById('gh-pat').value.trim();
  const key = document.getElementById('anth-key').value.trim();
  if (!pat || !key) { alert('Both keys required.'); return; }
  localStorage.setItem('cm_gh_pat', pat);
  localStorage.setItem('cm_anth_key', key);
  showMain();
}
function showMain() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('done-section').style.display = 'none';
  document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
}

// ── Photo handling ─────────────────────────────────────────────────────────────
function onPhoto(which, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    const mime = file.type || 'image/jpeg';
    const b64 = dataUrl.split(',')[1];
    const btnId = which === 'pump' ? 'pump-btn' : 'odo-btn';
    const btn = document.getElementById(btnId);

    // Show thumbnail
    let img = btn.querySelector('img');
    if (!img) { img = document.createElement('img'); btn.appendChild(img); }
    img.src = dataUrl;
    btn.classList.add('has-photo');

    if (which === 'pump') { pumpB64 = b64; pumpMime = mime; }
    else                  { odoB64 = b64; odoMime = mime; }

    document.getElementById('parse-btn').disabled = !(pumpB64 && odoB64);
  };
  reader.readAsDataURL(file);
}

// ── Claude parse ───────────────────────────────────────────────────────────────
async function parse() {
  setStatus('', '');
  const btn = document.getElementById('parse-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Parsing…';

  try {
    const key = localStorage.getItem('cm_anth_key');
    const body = {
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 512,
      system: `You parse fuel pump display photos and odometer photos to extract refueling data.
Return ONLY valid JSON with these exact keys:
{
  "odometer_mi": <integer, odometer reading in miles>,
  "gallons": <number, fuel volume dispensed>,
  "price_per_gal": <number, price per gallon>,
  "total_usd": <number, total dollar amount paid>,
  "fuel_type": <"Gasoline" | "Gas Premium" | "Diesel" | "Electric">,
  "full_tank": <true | false, true if pump stopped at full>
}
If a value cannot be read from the images, use null. Do not include any text outside the JSON object.`,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: pumpMime, data: pumpB64 } },
          { type: 'image', source: { type: 'base64', media_type: odoMime,  data: odoB64  } },
          { type: 'text',  text: 'First image is the pump display. Second image is the odometer. Extract all values.' }
        ]
      }]
    };

    const res = await fetch(API, {
      method: 'POST',
      headers: {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-request-type': 'CORS'
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${res.status}`);
    }

    const data = await res.json();
    const text = data.content[0].text.trim();
    const parsed = JSON.parse(text.replace(/^```json\n?/, '').replace(/\n?```$/, ''));

    populate(parsed);
    setStatus('Parsed. Check the values and log it.', 'success');
    document.getElementById('form-section').style.display = 'block';
  } catch (e) {
    setStatus('Parse failed: ' + e.message, 'error');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Parse photos';
  }
}

function populate(p) {
  if (p.odometer_mi) document.getElementById('f-odo').value = p.odometer_mi;
  if (p.gallons)     document.getElementById('f-gal').value = p.gallons;
  if (p.price_per_gal) document.getElementById('f-price').value = p.price_per_gal;
  if (p.total_usd)   document.getElementById('f-total').value = p.total_usd;
  if (p.fuel_type)   document.getElementById('f-fuel').value = p.fuel_type;
  document.getElementById('f-full').checked = p.full_tank !== false;
  updateDist();
}

function updateTotal() {
  const gal = parseFloat(document.getElementById('f-gal').value);
  const ppg = parseFloat(document.getElementById('f-price').value);
  if (gal && ppg && !document.getElementById('f-total').value) {
    document.getElementById('f-total').value = (gal * ppg).toFixed(2);
  }
}

function updateDist() {
  const odo = parseInt(document.getElementById('f-odo').value);
  if (odo && lastOdo) {
    const dist = odo - lastOdo;
    document.getElementById('dist-hint').textContent =
      dist > 0 ? `${dist} mi since last fill (prev: ${lastOdo})` : '';
  }
}

// ── GitHub commit ──────────────────────────────────────────────────────────────
async function commitEntry() {
  const btn = document.getElementById('commit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Committing…';
  setStatus('', '');

  try {
    const pat = localStorage.getItem('cm_gh_pat');
    const headers = {
      'Authorization': `Bearer ${pat}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    };

    // Fetch current file
    const fileRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, { headers });
    if (!fileRes.ok) throw new Error(`GitHub fetch failed: ${fileRes.status}`);
    const fileData = await fileRes.json();
    const sha = fileData.sha;
    const current = JSON.parse(atob(fileData.content.replace(/\n/g, '')));

    // Build new record
    const odo   = parseInt(document.getElementById('f-odo').value);
    const gal   = parseFloat(document.getElementById('f-gal').value);
    const price = parseFloat(document.getElementById('f-price').value);
    const total = parseFloat(document.getElementById('f-total').value);
    const fuel  = document.getElementById('f-fuel').value;
    const full  = document.getElementById('f-full').checked;
    const date  = document.getElementById('f-date').value;
    const notes = document.getElementById('f-notes').value.trim() || null;

    if (!odo || !gal || !total || !date) throw new Error('Odometer, gallons, total, and date are required.');

    // Compute distance from previous odometer
    const prevOdo = lastOdo;
    const dist = (prevOdo && odo > prevOdo) ? odo - prevOdo : null;

    const fills = current.refuelings || [];
    const newId = fills.length ? Math.max(...fills.map(f => f.id || 0)) + 1 : 1;

    const newRecord = {
      id: newId,
      data: date,
      combustivel: fuel,
      odometro: odo,
      preco: price || null,
      valor_total: total,
      volume: gal,
      distancia: dist,
      tanque_cheio: full,
      esqueceu_anterior: false,
      observacao: notes
    };

    fills.push(newRecord);
    current.refuelings = fills;

    const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(current, null, 2))));
    const msg = `feat: log fill-up ${date} — ${gal} gal @ $${price}/gal, ${odo} mi`;

    const putRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      method: 'PUT',
      headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, content: newContent, sha })
    });

    if (!putRes.ok) {
      const err = await putRes.json().catch(() => ({}));
      throw new Error(err.message || `GitHub write failed: ${putRes.status}`);
    }

    // Success
    const mpg = dist && gal ? (dist / gal).toFixed(1) : null;
    document.getElementById('done-summary').textContent =
      `${gal} gal · $${total} · ${odo.toLocaleString()} mi` +
      (dist ? ` · ${dist} mi range` : '') +
      (mpg ? ` · ${mpg} mpg` : '');
    document.getElementById('main').style.display = 'none';
    document.getElementById('done-section').style.display = 'block';

  } catch (e) {
    setStatus('Commit failed: ' + e.message, 'error');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Log it';
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type || '';
}

async function loadLastOdo() {
  try {
    const pat = localStorage.getItem('cm_gh_pat');
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      headers: { 'Authorization': `Bearer ${pat}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!res.ok) return;
    const fileData = await res.json();
    const data = JSON.parse(atob(fileData.content.replace(/\n/g, '')));
    const fills = (data.refuelings || []).filter(f => f.odometro).sort((a, b) => a.odometro - b.odometro);
    if (fills.length) lastOdo = fills[fills.length - 1].odometro;
  } catch (e) {
    console.error('loadLastOdo failed:', e);
  }
}

function reset() {
  pumpB64 = null; odoB64 = null;
  document.getElementById('pump-btn').classList.remove('has-photo');
  document.getElementById('odo-btn').classList.remove('has-photo');
  ['pump-btn','odo-btn'].forEach(id => {
    const img = document.getElementById(id).querySelector('img');
    if (img) img.remove();
  });
  document.getElementById('pump-input').value = '';
  document.getElementById('odo-input').value = '';
  document.getElementById('parse-btn').disabled = true;
  document.getElementById('form-section').style.display = 'none';
  document.getElementById('done-section').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('f-notes').value = '';
  setStatus('', '');
  loadLastOdo();
}

// ── Init ───────────────────────────────────────────────────────────────────────
if (hasKeys()) {
  showMain();
  loadLastOdo();
} else {
  showSetup();
}
</script>
</body>
</html>
