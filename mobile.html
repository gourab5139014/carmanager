<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Log Fill-up</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script src="supabase-config.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --border: #2a2a2a;
  --blue: #4da6ff;
  --blue-dim: #1a3a5c;
  --green: #4caf6e;
  --red: #cf6679;
  --text: #e0e0e0;
  --muted: #888;
  --radius: 12px;
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overscroll-behavior: none;
}

/* ── Auth ───────────────────────────────────────────────────────────── */
#auth-screen {
  min-height: 100vh; display: flex; flex-direction: column;
  justify-content: center; padding: 32px 24px;
}
#auth-screen h1 { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
#auth-screen p  { font-size: 0.85rem; color: var(--muted); margin-bottom: 32px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 0.7rem; color: var(--muted); text-transform: uppercase;
               letter-spacing: 0.06em; margin-bottom: 6px; }
.field input  { width: 100%; background: var(--surface); border: 1px solid var(--border);
                color: var(--text); border-radius: 10px; padding: 14px 16px; font-size: 1rem;
                -webkit-appearance: none; }
.field input:focus { outline: none; border-color: var(--blue); }

/* ── Shared button ──────────────────────────────────────────────────── */
.btn-primary {
  width: 100%; padding: 16px; background: var(--blue); border: none;
  border-radius: var(--radius); color: #000; font-size: 1rem; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: background 0.15s; -webkit-appearance: none;
}
.btn-primary:active { background: #70b8ff; }
.btn-primary:disabled { background: var(--blue-dim); color: #4d7a9e; }

/* ── Loading / error screens ────────────────────────────────────────── */
#init-loading, #config-error { padding: 80px 24px; text-align: center; color: var(--muted); }
#config-error { color: var(--red); }

/* ── Main app ───────────────────────────────────────────────────────── */
#app { min-height: 100vh; display: flex; flex-direction: column; }

header {
  padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
header h1 { font-size: 1rem; font-weight: 600; color: #fff; }
.back { font-size: 0.8rem; color: var(--blue); text-decoration: none; }
#btn-logout { background: none; border: 1px solid var(--border); color: var(--muted);
              font-size: 0.75rem; padding: 5px 12px; border-radius: 6px; cursor: pointer; }

/* ── Scrollable content ─────────────────────────────────────────────── */
#scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px; }

/* ── Banners ────────────────────────────────────────────────────────── */
.banner { border-radius: 10px; padding: 14px 16px; font-size: 0.88rem; margin-bottom: 16px; display: none; }
.banner.success { background: #0d2e1a; border: 1px solid #1a6b33; color: var(--green); }
.banner.error   { background: #2e0d0d; border: 1px solid #6b1a1a; color: var(--red);   }
.banner.info    { background: #0d1e2e; border: 1px solid #1a4a6b; color: #6aacdf;      }

/* ── Photo capture cards ────────────────────────────────────────────── */
.photo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }

.photo-card {
  background: var(--surface); border: 2px dashed var(--border);
  border-radius: var(--radius); aspect-ratio: 4/3; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none; user-select: none;
}
.photo-card:active     { border-color: var(--blue); background: #131313; }
.photo-card.captured   { border-style: solid; border-color: var(--green); }
.photo-card.scanning   { border-color: var(--blue); }
.photo-card.drag-over  { border-color: var(--blue); background: #0d1e2e; border-style: solid; }

.photo-card .icon { font-size: 2rem; margin-bottom: 6px; pointer-events: none; }
.photo-card .cap-label { font-size: 0.72rem; color: var(--muted); text-align: center;
                         line-height: 1.3; pointer-events: none; padding: 0 8px; }
.photo-card .cap-label strong { display: block; font-size: 0.82rem; color: var(--text); margin-bottom: 2px; }
.photo-card .cap-label .hint { font-size: 0.65rem; color: #555; margin-top: 3px; }

.photo-card img.thumb {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; border-radius: calc(var(--radius) - 2px);
}
.photo-card .retake {
  position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.7);
  color: #fff; font-size: 0.65rem; padding: 3px 8px; border-radius: 20px;
  pointer-events: none;
}
.photo-card .scan-overlay {
  position: absolute; inset: 0; background: rgba(15,15,15,0.75);
  display: flex; align-items: center; justify-content: center;
  border-radius: calc(var(--radius) - 2px);
}
.spinner {
  width: 28px; height: 28px; border: 3px solid var(--border);
  border-top-color: var(--blue); border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* hidden file inputs */
#input-odometer, #input-pump { display: none; }

/* ── OCR result chips ───────────────────────────────────────────────── */
.ocr-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.chip {
  background: #0d2e1a; border: 1px solid #1a6b33; color: var(--green);
  border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; font-weight: 600;
}
.chip.error-chip { background: #2e0d0d; border-color: #6b1a1a; color: var(--red); }

/* ── Form fields ────────────────────────────────────────────────────── */
.section-label {
  font-size: 0.68rem; color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.07em; margin-bottom: 12px; margin-top: 4px;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-grid .full { grid-column: 1 / -1; }

.input-wrap { position: relative; }
.input-wrap label {
  display: block; font-size: 0.68rem; color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.05em; margin-bottom: 5px;
}
.input-wrap input, .input-wrap select, .input-wrap textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); border-radius: 10px; padding: 12px 14px; font-size: 1rem;
  font-family: inherit; -webkit-appearance: none; appearance: none;
}
.input-wrap input:focus, .input-wrap select:focus, .input-wrap textarea:focus {
  outline: none; border-color: var(--blue);
}
.input-wrap input.autofilled { border-color: var(--green); background: #0d1a10; }
.input-wrap .computed-badge {
  position: absolute; right: 10px; top: 50%; transform: translateY(-2px);
  font-size: 0.65rem; color: var(--muted); pointer-events: none;
}

.checkbox-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; }
.checkbox-row input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--blue); flex-shrink: 0; }
.checkbox-row label { font-size: 0.95rem; color: var(--text); cursor: pointer; }

textarea { resize: none; min-height: 64px; }

/* ── Date display / selector ─────────────────────────────────────────── */
.date-btn {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); border-radius: 10px; padding: 12px 14px;
  font-size: 0.95rem; text-align: left; cursor: pointer; -webkit-appearance: none;
}

/* ── Sticky submit area ─────────────────────────────────────────────── */
#submit-area {
  padding: 12px 20px calc(12px + env(safe-area-inset-bottom));
  border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0;
}
.submit-spinner { width: 20px; height: 20px; border: 2px solid #4d7a9e;
                  border-top-color: var(--blue); border-radius: 50%;
                  animation: spin 0.7s linear infinite; display: none; }
</style>
</head>
<body>

<div id="init-loading">Initialising…</div>
<div id="config-error" style="display:none"></div>

<div id="auth-screen" style="display:none">
  <h1>Car Analytics</h1>
  <p>Sign in to log a fill-up</p>
  <div class="field"><label>Email</label>
    <input type="email" id="auth-email" autocomplete="email" inputmode="email"></div>
  <div class="field"><label>Password</label>
    <input type="password" id="auth-password" autocomplete="current-password"></div>
  <div class="banner error" id="auth-error"></div>
  <button id="btn-login" class="btn-primary" style="margin-top:8px">Sign In</button>
</div>

<div id="app" style="display:none">
  <header>
    <a class="back" href="index.html">← Dashboard</a>
    <h1>Log Fill-up</h1>
    <button id="btn-logout">Sign out</button>
  </header>

  <div id="scroll-area">
    <div class="banner success" id="banner-success"></div>
    <div class="banner error"   id="banner-error"></div>
    <div class="banner info"    id="banner-info"></div>

    <!-- Hidden file inputs (camera capture) -->
    <input type="file" id="input-odometer" accept="image/*">
    <input type="file" id="input-pump"     accept="image/*">

    <!-- Photo capture cards -->
    <div class="section-label">Take photos to auto-fill</div>
    <div class="photo-row">
      <div class="photo-card" id="card-odometer" role="button" tabindex="0" aria-label="Capture odometer photo">
        <div class="icon">🔢</div>
        <div class="cap-label">
          <strong>Odometer</strong>
          tap · camera · library
          <span class="hint">or drop image here</span>
        </div>
      </div>
      <div class="photo-card" id="card-pump" role="button" tabindex="0" aria-label="Capture fuel pump photo">
        <div class="icon">⛽</div>
        <div class="cap-label">
          <strong>Pump Display</strong>
          tap · camera · library
          <span class="hint">or drop image here</span>
        </div>
      </div>
    </div>

    <!-- OCR result chips -->
    <div class="ocr-chips" id="ocr-chips"></div>

    <!-- Form -->
    <form id="log-form" novalidate>
      <div class="section-label">Review &amp; confirm</div>

      <!-- Date -->
      <div class="input-wrap full" style="margin-bottom:12px">
        <label>Date</label>
        <input type="date" id="f-date" required>
      </div>

      <div class="form-grid">
        <!-- Odometer -->
        <div class="input-wrap full">
          <label>Odometer (miles)</label>
          <input type="number" id="f-odometer" inputmode="numeric" min="0" step="1"
                 placeholder="e.g. 220700" required>
        </div>

        <!-- Volume -->
        <div class="input-wrap">
          <label>Gallons</label>
          <input type="number" id="f-volume" inputmode="decimal" min="0" step="0.001"
                 placeholder="0.000" required>
        </div>

        <!-- Price per gallon -->
        <div class="input-wrap">
          <label>$/gal</label>
          <input type="number" id="f-price" inputmode="decimal" min="0" step="0.001"
                 placeholder="0.000">
        </div>

        <!-- Total cost -->
        <div class="input-wrap full" style="position:relative">
          <label>Total ($)</label>
          <input type="number" id="f-total" inputmode="decimal" min="0" step="0.01"
                 placeholder="0.00" required>
          <span class="computed-badge" id="computed-badge"></span>
        </div>

        <!-- Fuel type -->
        <div class="input-wrap full">
          <label>Fuel Type</label>
          <select id="f-fuel-type">
            <option value="Gasoline">Gasoline</option>
            <option value="Gas Premium">Gas Premium</option>
          </select>
        </div>
      </div>

      <!-- Full tank -->
      <div class="checkbox-row">
        <input type="checkbox" id="f-full-tank" checked>
        <label for="f-full-tank">Full tank</label>
      </div>

      <!-- Notes (collapsed) -->
      <details style="margin-top:4px">
        <summary style="font-size:0.8rem;color:var(--muted);cursor:pointer;padding:8px 0;list-style:none">
          ＋ Add notes (optional)
        </summary>
        <div class="input-wrap" style="margin-top:10px">
          <textarea id="f-notes" placeholder="e.g. Shell on Main St" rows="2"></textarea>
        </div>
      </details>

    </form>
  </div><!-- /scroll-area -->

  <div id="submit-area">
    <button type="submit" form="log-form" id="btn-submit" class="btn-primary">
      <div class="submit-spinner" id="spinner"></div>
      <span id="btn-label">Log Fill-up</span>
    </button>
  </div>
</div>

<script>
(function () {
  // ── Config check ────────────────────────────────────────────────────────────
  const configOk =
    typeof SUPABASE_URL      === 'string' && SUPABASE_URL.startsWith('https://') &&
    typeof SUPABASE_ANON_KEY === 'string' && SUPABASE_ANON_KEY.length > 20;

  if (!configOk) {
    document.getElementById('init-loading').style.display = 'none';
    const el = document.getElementById('config-error');
    el.style.display = 'block';
    el.innerHTML = '<strong>Supabase not configured.</strong> Copy supabase-config.template.js to supabase-config.js and fill in your values.';
    return;
  }

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const EDGE_URL = SUPABASE_URL + '/functions/v1/ocr-image';

  // ── DOM shortcuts ────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  // ── Default date ─────────────────────────────────────────────────────────────
  $('f-date').value = new Date().toISOString().slice(0, 10);

  // ── Auto-compute total ───────────────────────────────────────────────────────
  function recomputeTotal() {
    const vol   = parseFloat($('f-volume').value);
    const price = parseFloat($('f-price').value);
    if (!isNaN(vol) && !isNaN(price) && vol > 0 && price > 0) {
      if (!$('f-total').dataset.manuallyEdited) {
        $('f-total').value = (vol * price).toFixed(2);
        $('computed-badge').textContent = 'auto';
      }
    } else {
      $('computed-badge').textContent = '';
    }
  }
  $('f-volume').addEventListener('input', recomputeTotal);
  $('f-price').addEventListener('input',  recomputeTotal);
  $('f-total').addEventListener('input',  () => {
    $('f-total').dataset.manuallyEdited = 'true';
    $('computed-badge').textContent = 'manual';
  });

  // ── OCR chips display ────────────────────────────────────────────────────────
  function addChip(text, isError) {
    const d = document.createElement('div');
    d.className = 'chip' + (isError ? ' error-chip' : '');
    d.textContent = text;
    $('ocr-chips').appendChild(d);
  }
  function clearChips() { $('ocr-chips').innerHTML = ''; }

  // ── Autofill a field with green flash ────────────────────────────────────────
  function autofill(id, value) {
    const el = $(id);
    el.value = value;
    el.classList.add('autofilled');
    el.addEventListener('input', () => el.classList.remove('autofilled'), { once: true });
  }

  // ── Image → JPEG base64 (handles HEIF/HEIC from iPhone) ─────────────────────
  async function toJpegBase64(file) {
    let blob = file;
    
    // If it's HEIC/HEIF, convert it to JPEG blob first
    const isHeic = file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif') || file.type === 'image/heic' || file.type === 'image/heif';
    if (isHeic && typeof heic2any === 'function') {
      try {
        console.log('Converting HEIC to JPEG...');
        const converted = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.8 });
        blob = Array.isArray(converted) ? converted[0] : converted;
        console.log('HEIC conversion successful');
      } catch (err) {
        console.error('HEIC conversion failed:', err);
        // Fallback to original file, maybe browser supports it natively
      }
    }

    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(blob);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        // Cap at 1024px on the long edge — plenty for OCR, reduces payload & processing time
        const MAX = 1024;
        const scale = Math.min(1, MAX / Math.max(img.width, img.height));
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        // Reduce quality to 0.8 to keep payload small
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        resolve(dataUrl.split(',')[1]);
      };
      img.onerror = () => { 
        URL.revokeObjectURL(url); 
        reject(new Error(`Image decode failed for ${file.name} (${file.type})`)); 
      };
      img.src = url;
    });
  }

  // ── Photo capture logic ──────────────────────────────────────────────────────
  function setupCapture(cardId, inputId, type) {
    const card  = $(cardId);
    const input = $(inputId);

    // Trigger file picker on card tap
    card.addEventListener('click', () => input.click());
    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') input.click(); });

    // ── Drag and drop (desktop) ────────────────────────────────────────────────
    card.addEventListener('dragover', e => {
      e.preventDefault();
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', e => {
      if (!card.contains(e.relatedTarget)) card.classList.remove('drag-over');
    });
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) processFile(file);
    });

    input.addEventListener('change', async () => {
      const file = input.files[0];
      if (!file) return;
      processFile(file);
      input.value = '';
    });

    async function processFile(file) {
      console.log(`Processing file: ${file.name}, type: ${file.type}, size: ${file.size} bytes`);
      try {
        // Show thumbnail
        const thumbUrl = URL.createObjectURL(file);
        card.innerHTML = `<img class="thumb" src="${thumbUrl}" alt=""><div class="retake">retake</div>
          <div class="scan-overlay"><div class="spinner"></div></div>`;
        card.classList.add('captured', 'scanning');

        // Check for HEIC/HEIF which lacks native browser support in some browsers
        const isHeic = file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif') || file.type === 'image/heic' || file.type === 'image/heif';
        if (isHeic && !window.heic2any) {
          console.warn('HEIC detected but heic2any not loaded. Native browser support may fail.');
        }

        // Convert to JPEG via Canvas (handles HEIF/HEIC and any other format)
        const base64 = await toJpegBase64(file);

        // Get auth token for edge function
        const { data: { session } } = await sb.auth.getSession();
        const token = session?.access_token ?? SUPABASE_ANON_KEY;

        const res = await fetch(EDGE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
            'apikey': SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({ image: base64, mediaType: 'image/jpeg', type }),
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(`Server returned ${res.status}: ${text.slice(0, 100)}`);
        }

        const data = await res.json();

        // Remove scanning overlay
        card.querySelector('.scan-overlay')?.remove();
        card.classList.remove('scanning');

        if (type === 'odometer') {
          if (data.odometer != null) {
            autofill('f-odometer', data.odometer);
            addChip(`📍 ${Number(data.odometer).toLocaleString()} mi`);
          } else {
            addChip(`Odometer unclear — ${data.error || 'enter manually'}`, true);
          }
        } else {
          let filled = false;
          if (data.volume_gal != null)    { autofill('f-volume', data.volume_gal);   filled = true; }
          if (data.price_per_gal != null) { autofill('f-price',  data.price_per_gal); filled = true; }
          if (data.total_cost != null) {
            $('f-total').dataset.manuallyEdited = 'true';
            autofill('f-total', data.total_cost);
            $('computed-badge').textContent = 'from pump';
            filled = true;
          } else if (data.volume_gal && data.price_per_gal) {
            recomputeTotal();
            filled = true;
          }
          if (filled) {
            const parts = [];
            if (data.volume_gal)    parts.push(`${data.volume_gal} gal`);
            if (data.price_per_gal) parts.push(`$${data.price_per_gal}/gal`);
            if (data.total_cost)    parts.push(`$${data.total_cost}`);
            addChip('⛽ ' + (parts.join(' · ') || 'pump read'));
          } else {
            addChip(`Pump display unclear — ${data.error || 'enter manually'}`, true);
          }
        }

        if (navigator.vibrate) navigator.vibrate(40);

      } catch (err) {
        console.error('OCR processFile failed:', err);
        card.querySelector('.scan-overlay')?.remove();
        card.classList.remove('scanning');
        addChip(`OCR error: ${err.message}`, true);
      }
    } // end processFile
  }

  setupCapture('card-odometer', 'input-odometer', 'odometer');
  setupCapture('card-pump',     'input-pump',     'pump');

  // ── Banners ──────────────────────────────────────────────────────────────────
  let wakeTimer = null;
  function showBanner(type, msg) {
    ['success','error','info'].forEach(t => {
      const el = $(`banner-${t}`);
      el.style.display = 'none';
      el.textContent = '';
    });
    if (type && msg) {
      const el = $(`banner-${type}`);
      el.textContent = msg;
      el.style.display = 'block';
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  function setSubmitting(active) {
    $('btn-submit').disabled = active;
    $('spinner').style.display = active ? 'block' : 'none';
    $('btn-label').textContent = active ? 'Saving…' : 'Log Fill-up';
    if (active) {
      wakeTimer = setTimeout(() =>
        showBanner('info', 'Database waking up (~30s on free tier)… please wait.'), 3000);
    } else {
      clearTimeout(wakeTimer);
    }
  }

  // ── Auth state ────────────────────────────────────────────────────────────────
  sb.auth.onAuthStateChange((_, session) => {
    $('init-loading').style.display = 'none';
    if (session) {
      $('auth-screen').style.display = 'none';
      $('app').style.display = 'flex';
    } else {
      $('auth-screen').style.display = 'block';
      $('app').style.display = 'none';
    }
  });

  // ── Login ─────────────────────────────────────────────────────────────────────
  $('btn-login').addEventListener('click', async () => {
    const email    = $('auth-email').value.trim();
    const password = $('auth-password').value;
    $('auth-error').style.display = 'none';
    $('btn-login').disabled = true;
    $('btn-login').textContent = 'Signing in…';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    $('btn-login').disabled = false;
    $('btn-login').textContent = 'Sign In';
    if (error) {
      $('auth-error').textContent = error.message;
      $('auth-error').style.display = 'block';
    }
  });
  $('auth-password').addEventListener('keydown', e => { if (e.key === 'Enter') $('btn-login').click(); });

  // ── Logout ────────────────────────────────────────────────────────────────────
  $('btn-logout').addEventListener('click', () => sb.auth.signOut());

  // ── Form submit ───────────────────────────────────────────────────────────────
  let submitting = false;
  $('log-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (submitting) return;
    showBanner(null, null);

    const date     = $('f-date').value;
    const odometer = parseInt($('f-odometer').value, 10);
    const fuelType = $('f-fuel-type').value;
    const volume   = parseFloat($('f-volume').value);
    const price    = parseFloat($('f-price').value)   || null;
    const total    = parseFloat($('f-total').value);
    const fullTank = $('f-full-tank').checked;
    const notes    = $('f-notes').value.trim() || null;

    if (!date)                          { showBanner('error', 'Date is required.');               return; }
    if (!(odometer > 0) || isNaN(odometer)) { showBanner('error', 'Odometer reading is required.'); return; }
    if (!(volume > 0)   || isNaN(volume))   { showBanner('error', 'Volume (gallons) is required.'); return; }
    if (!(total > 0)    || isNaN(total))    { showBanner('error', 'Total cost is required.');        return; }

    submitting = true;
    setSubmitting(true);

    // Compute distance_mi from the previous fill's odometer
    let distance_mi = null;
    const { data: prevFills } = await sb
      .from('refuelings')
      .select('odometer')
      .not('odometer', 'is', null)
      .lt('odometer', odometer)
      .order('odometer', { ascending: false })
      .limit(1);
    if (prevFills && prevFills.length > 0) {
      distance_mi = odometer - prevFills[0].odometer;
    }

    const { error } = await sb.from('refuelings').insert({
      date, odometer, fuel_type: fuelType, volume_gal: volume,
      price_per_gal: price, total_cost: total,
      full_tank: fullTank, notes, distance_mi,
    });

    submitting = false;
    setSubmitting(false);

    if (error) { showBanner('error', `Error: ${error.message}`); return; }

    if (navigator.vibrate) navigator.vibrate([40, 60, 40]);
    showBanner('success',
      `Logged! ${date} · ${odometer.toLocaleString()} mi · ${volume} gal · $${total.toFixed(2)}`);

    // Reset
    $('log-form').reset();
    $('f-date').value = new Date().toISOString().slice(0, 10);
    delete $('f-total').dataset.manuallyEdited;
    $('computed-badge').textContent = '';
    clearChips();
    // Reset photo cards
    ['card-odometer','card-pump'].forEach(id => {
      const c = $(id);
      const isOdo = id === 'card-odometer';
      c.className = 'photo-card';
      c.innerHTML = `<div class="icon">${isOdo ? '🔢' : '⛽'}</div>
        <div class="cap-label"><strong>${isOdo ? 'Odometer' : 'Pump Display'}</strong>
          tap · camera · library<span class="hint">or drop image here</span></div>`;
    });
    $('scroll-area').scrollTo({ top: 0, behavior: 'smooth' });
  });

}());
</script>
</body>
</html>
