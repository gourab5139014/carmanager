name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          # Hono and other npm packages are imported via 'npm:...' in Deno/Edge functions
          # but for tests/test_metrics.js (Node), we might need to install them if they aren't globally available.
          # However, metrics.js is currently standalone logic.
          # For Python:
          python -m pip install --upgrade pip
          # If there were requirements, we'd install them here:
          # pip install -r requirements.txt

      - name: Run JS tests
        run: make test-js

      - name: Run Python tests
        run: make test-py
