name: Deploy Dashboard

on:
  push:
    branches: [main, 'feat/**']
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: "deploy-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.construct_url.outputs.api_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            FUNCTION_NAME="ocr-image"
          else
            FUNCTION_NAME="ocr-image-dev"
          fi
          
          # Deploy the function code only (no frontend bundling)
          supabase functions deploy $FUNCTION_NAME --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          
          # Ensure dev specific env vars are set if on feat branch
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            supabase secrets set DB_SCHEMA=dev API_BASE_PATH=/functions/v1/ocr-image-dev --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Construct API URL
        id: construct_url
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            NAME="ocr-image"
          else
            NAME="ocr-image-dev"
          fi
          echo "api_url=https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/functions/v1/$NAME" >> $GITHUB_OUTPUT

  build-and-deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          # Inject the URL generated by the backend job
          VITE_API_URL=${{ needs.deploy-backend.outputs.api_url }} npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # If main branch, deploy to production. Otherwise, preview.
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
          working-directory: ./frontend
